name: Birchmount Daily SDR Agent

on:
  schedule:
    #- cron: '0 7 * * 1-4'  # 3 AM Eastern Mon-Thu (7 AM UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Birchmount SDR Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MANUS_API_KEY: ${{ secrets.MANUS_API_KEY }}
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
        run: python sdr_agent.py

      - name: Commit processed tracking files
        run: |
          git config user.name "Birchmount SDR Bot"
          git config user.email "bot@birchmount.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/satyendrak-bmn/lead-gen-agent.git
          touch processed.txt rep_counter.txt
          git add processed.txt rep_counter.txt birchmount-apollo-contacts.csv
          git commit -m "Update processed tracking - $(date)" || echo "No changes"
          git push